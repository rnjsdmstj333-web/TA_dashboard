<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TA 경력채용 운영 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#f2f2f0;--surface:#fff;--surface2:#f7f7f5;--border:#e0e0db;--text:#1c1c1a;--text2:#6b6a65;--text3:#a0a09a;--accent:#1c1c1a;--blue:#2563eb;--blue-light:#eff6ff;--green:#15803d;--green-light:#f0fdf4;--amber:#b45309;--amber-light:#fffbeb;--red:#b91c1c;--red-light:#fef2f2;--purple:#6d28d9;--purple-light:#f5f3ff;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200}
.header-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.header-title span{color:var(--text3);font-weight:400;font-size:13px;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}
.last-update{font-size:11px;color:var(--text3)}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.upload-btn:hover{opacity:.85}
#fileInput{display:none}
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* Sidebar */
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 0}
.sidebar-section{margin-bottom:4px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.6px;color:var(--text3);padding:6px 14px 4px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sidebar-label span{cursor:pointer;opacity:.6;font-size:11px}
.filter-items{padding:0 10px 8px}
.filter-item{padding:5px 8px;border-radius:var(--rs);cursor:pointer;font-size:12px;color:var(--text2);transition:background .1s;display:flex;align-items:center;justify-content:space-between;user-select:none}
.filter-item:hover{background:var(--surface2)}
.filter-item.active{background:var(--accent);color:#fff}
.filter-item .cnt{font-size:10px;opacity:.7}
.sidebar-divider{height:1px;background:var(--border);margin:6px 10px}

/* Main */
.main{flex:1;overflow-y:auto;padding:16px}
.hidden{display:none!important}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:60px;text-align:center;cursor:pointer;background:var(--surface);margin-bottom:16px}
.upload-zone h2{font-size:15px;font-weight:500;margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--text3)}

/* Summary top row */
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.sum-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sum-val{font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1}
.sum-sub{font-size:10px;color:var(--text3);margin-top:3px}
.sum-card.accent{border-top:3px solid var(--accent)}

/* Funnel cards */
.funnel-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.funnel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;text-align:center}
.funnel-stage{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
.funnel-num{font-size:18px;font-weight:700;letter-spacing:-.5px}
.funnel-rate{font-size:10px;color:var(--text3);margin-top:2px}
.funnel-arrow{display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text3);padding-top:20px}

/* Interview + Rate section */
.mid-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.info-card-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:12px;border-bottom:1px solid var(--bg)}
.info-row:last-child{border-bottom:none}
.info-row .lbl{color:var(--text2)}
.info-row .val{font-weight:600}
.rate-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.rate-item{text-align:center;padding:8px 4px;border-right:1px solid var(--border)}
.rate-item:last-child{border-right:none}
.rate-label{font-size:9px;color:var(--text3);margin-bottom:3px}
.rate-open{font-size:10px;font-weight:500}
.rate-total{font-size:10px;color:var(--text3)}
.rate-pct{font-size:16px;font-weight:700;color:var(--blue)}

/* Stage table */
.stage-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:12px;overflow:hidden}
.stage-table-title{font-size:12px;font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2)}
th.left{text-align:left}
td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px;text-align:center;vertical-align:middle}
td.left{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
td .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.b-blue{background:var(--blue-light);color:var(--blue)}
.b-green{background:var(--green-light);color:var(--green)}
.b-amber{background:var(--amber-light);color:var(--amber)}
.b-red{background:var(--red-light);color:var(--red)}
.b-purple{background:var(--purple-light);color:var(--purple)}
.b-gray{background:var(--surface2);color:var(--text2)}
td.num{font-variant-numeric:tabular-nums;font-weight:500}
td.zero{color:var(--text3)}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px;overflow:hidden}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}
.chart-wrap{position:relative}

/* Owner filter buttons */
.owner-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.owner-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;font-family:inherit}
.owner-btn:hover{border-color:var(--accent)}
.owner-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<header class="header">
  <div class="header-title">TA 경력채용 운영 대시보드<span id="lastUpdate"></span></div>
  <div class="header-right">
    <label class="upload-btn" for="fileInput">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6.5 8.5V2M4 4.5l2.5-2.5 2.5 2.5M2 9.5v1a1 1 0 001 1h7a1 1 0 001-1v-1"/></svg>
      엑셀 업로드
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">진행상황 <span onclick="clearFilter('status')">초기화</span></div>
      <div class="filter-items" id="filterStatus"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">직군 <span onclick="clearFilter('job')">초기화</span></div>
      <div class="filter-items" id="filterJob"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Lv.4 조직 <span onclick="clearFilter('lv4')">초기화</span></div>
      <div class="filter-items" id="filterLv4"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Lv.5 조직 <span onclick="clearFilter('lv5')">초기화</span></div>
      <div class="filter-items" id="filterLv5"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="upload-zone hidden" id="uploadZone">
      <h2>운영 시트 엑셀 파일을 업로드하세요</h2>
      <p>드래그&드롭 또는 클릭 · "운영 시트" 탭 자동 인식</p>
    </div>

    <div id="dashboard">
      <!-- Owner buttons -->
      <div class="owner-grid" id="ownerBtns"></div>

      <!-- Summary -->
      <div class="summary-grid" id="summaryGrid"></div>

      <!-- Funnel -->
      <div class="funnel-row" id="funnelRow"></div>

      <!-- Mid: Interview stats + conversion rates -->
      <div class="mid-grid">
        <div class="info-card">
          <div class="info-card-title">1차 인터뷰 대상자 현황</div>
          <div id="interview1Info"></div>
        </div>
        <div class="info-card">
          <div class="info-card-title">2차 인터뷰 대상자 현황</div>
          <div id="interview2Info"></div>
        </div>
        <div class="info-card">
          <div class="info-card-title">퍼널 전환율</div>
          <div class="rate-grid" id="rateGrid"></div>
        </div>
      </div>

      <!-- Stage table -->
      <div class="stage-table-wrap">
        <div class="stage-table-title"># 전형단계별 채용 현황</div>
        <div style="overflow-x:auto"><table id="stageTable"></table></div>
      </div>

      <!-- Charts -->
      <div class="chart-grid">
        <div class="chart-card full">
          <div class="chart-title">조직별 전형단계 분포 (지원자 기준)</div>
          <div class="chart-wrap" style="height:220px"><canvas id="cOrg" role="img" aria-label="조직별 전형단계 분포"></canvas></div>
        </div>
        <div class="chart-card full">
          <div class="chart-title">조직별 채용 퍼널 (Lv.5)</div>
          <div class="chart-wrap" style="height:220px"><canvas id="cFunnel" role="img" aria-label="조직별 채용 퍼널"></canvas></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let allRows = [];
let filters = { status: null, job: null, lv4: null, lv5: null, owner: null };
let charts = [];

const STAGE_ORDER = ['채용공고','필기전형','스크리닝','서류전형','1차 인터뷰','2차 인터뷰','3차 인터뷰','프로필','처우협의','합격/입사','레퍼런스 체크','전체 불합격'];
const STAGE_COLORS = {'채용공고':'#94a3b8','필기전형':'#64748b','스크리닝':'#475569','서류전형':'#3b82f6','1차 인터뷰':'#6366f1','2차 인터뷰':'#8b5cf6','3차 인터뷰':'#a855f7','프로필':'#f59e0b','처우협의':'#f97316','합격/입사':'#16a34a','레퍼런스 체크':'#0891b2','전체 불합격':'#ef4444'};

function n(v){const x=Number(v);return(v===null||v===undefined||v===''||isNaN(x))?0:Math.round(x)}
function fmt(v){return v===0?'-':v.toLocaleString()}
function pct(a,b){return b>0?Math.round(a/b*100)+'%':'-%'}

function stageBadge(s){
  if(!s)return'<span class="badge b-gray">-</span>';
  const m={'합격/입사':'b-green','처우협의':'b-green','1차 인터뷰':'b-blue','2차 인터뷰':'b-purple','3차 인터뷰':'b-purple','프로필':'b-amber','서류전형':'b-amber','채용공고':'b-gray','필기전형':'b-gray','스크리닝':'b-gray','전체 불합격':'b-red','레퍼런스 체크':'b-blue'};
  return`<span class="badge ${m[s]||'b-gray'}">${s}</span>`;
}

function getFiltered(){
  return allRows.filter(r=>
    (!filters.status||r['진행상황']===filters.status)&&
    (!filters.job||r['직군']===filters.job)&&
    (!filters.lv4||r['Lv.4']===filters.lv4)&&
    (!filters.lv5||r['Lv.5']===filters.lv5)&&
    (!filters.owner||r['운영담당']===filters.owner)
  );
}

function clearFilter(key){filters[key]=null;render();}

function buildSidebar(rows){
  function makeFilter(elId, key, vals){
    const el=document.getElementById(elId);
    const counts={};
    rows.forEach(r=>{const v=r[key];if(v&&v!=='NaN')counts[v]=(counts[v]||0)+1;});
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    el.innerHTML=sorted.map(([v,c])=>`
      <div class="filter-item${filters[{filterStatus:'status',filterJob:'job',filterLv4:'lv4',filterLv5:'lv5'}[elId]]===v?' active':''}" onclick="setFilter('${{filterStatus:'status',filterJob:'job',filterLv4:'lv4',filterLv5:'lv5'}[elId]}','${v.replace(/'/g,"\\'")}')">
        <span>${v}</span><span class="cnt">${c}</span>
      </div>`).join('');
  }
  makeFilter('filterStatus','진행상황',rows);
  makeFilter('filterJob','직군',rows);
  makeFilter('filterLv4','Lv.4',rows);
  makeFilter('filterLv5','Lv.5',rows);
}

function setFilter(key,val){
  filters[key]=filters[key]===val?null:val;
  render();
}

function render(){
  const rows=getFiltered();
  buildSidebar(allRows);

  // Owner buttons
  const owners=[...new Set(allRows.map(r=>r['운영담당']).filter(Boolean))].sort();
  document.getElementById('ownerBtns').innerHTML=
    ['전체',...owners].map(o=>`<button class="owner-btn${(o==='전체'&&!filters.owner)||(o===filters.owner)?' active':''}" onclick="setOwner('${o}')">${o}</button>`).join('');

  const total=rows.length;
  const apply=rows.reduce((s,r)=>s+n(r['지원자']),0);
  const doc=rows.reduce((s,r)=>s+n(r['서류검토']),0);
  const i1=rows.reduce((s,r)=>s+n(r['1차 인터뷰']),0);
  const i2=rows.reduce((s,r)=>s+n(r['2차 인터뷰']),0);
  const hire=rows.reduce((s,r)=>s+n(r['최종합격']),0);

  // Summary
  const ongoing=rows.filter(r=>['검토 중','진행 중','평가 중','시작 전'].includes(r['진행상황'])).length;
  const done=rows.filter(r=>r['진행상황']==='전형완료').length;
  document.getElementById('summaryGrid').innerHTML=[
    {label:'# 총합',val:total,sub:`진행중 ${ongoing} · 완료 ${done}`,accent:true},
    {label:'총 지원자',val:apply.toLocaleString(),sub:''},
    {label:'서류 검토',val:doc.toLocaleString(),sub:''},
    {label:'1차 인터뷰',val:i1.toLocaleString(),sub:''},
    {label:'최종합격',val:hire,sub:`2차 통과 ${i2}`},
  ].map(m=>`<div class="sum-card${m.accent?' accent':''}"><div class="sum-label">${m.label}</div><div class="sum-val">${m.val}</div><div class="sum-sub">${m.sub}</div></div>`).join('');

  // Funnel
  const fSteps=[
    {label:'지원자',val:apply,rate:''},
    {label:'서류검토',val:doc,rate:pct(doc,apply)},
    {label:'1차 인터뷰',val:i1,rate:pct(i1,doc)},
    {label:'2차 인터뷰',val:i2,rate:pct(i2,i1)},
    {label:'최종합격',val:hire,rate:pct(hire,i2)},
  ];
  document.getElementById('funnelRow').innerHTML=fSteps.map(f=>`
    <div class="funnel-card">
      <div class="funnel-stage">${f.label}</div>
      <div class="funnel-num">${f.val.toLocaleString()}</div>
      <div class="funnel-rate">${f.rate?'전환율 '+f.rate:''}</div>
    </div>`).join('');

  // Interview info
  const r1=rows.filter(r=>r['전형단계']==='1차 인터뷰');
  const r2=rows.filter(r=>r['전형단계']==='2차 인터뷰');
  const i1_active=r1.reduce((s,r)=>s+n(r['1차 인터뷰']),0);
  const i2_active=r2.reduce((s,r)=>s+n(r['2차 인터뷰']),0);
  document.getElementById('interview1Info').innerHTML=`
    <div class="info-row"><span class="lbl">총 후보자</span><span class="val">${i1_active}명</span></div>
    <div class="info-row"><span class="lbl">L 1차 인터뷰 종료</span><span class="val">${r1.length}건</span></div>
    <div class="info-row"><span class="lbl">L 중간 노티 대상자</span><span class="val">-</span></div>
    <div class="info-row"><span class="lbl">L 전형 종료 노티 대상자</span><span class="val">-</span></div>`;
  document.getElementById('interview2Info').innerHTML=`
    <div class="info-row"><span class="lbl">총 후보자</span><span class="val">${i2_active}명</span></div>
    <div class="info-row"><span class="lbl">L 2차 인터뷰 종료</span><span class="val">${r2.length}건</span></div>
    <div class="info-row"><span class="lbl">L 중간 노티 대상자</span><span class="val">-</span></div>
    <div class="info-row"><span class="lbl">L 전형 종료 노티 대상자</span><span class="val">-</span></div>`;

  // Conversion rates
  const rateSteps=[
    {label:'필기전형→서류검토',open:pct(doc,apply),total:pct(doc,apply)},
    {label:'서류검토→1차 인터뷰',open:pct(i1,doc),total:pct(i1,doc)},
    {label:'1차 인터뷰→2차 인터뷰',open:pct(i2,i1),total:pct(i2,i1)},
  ];
  document.getElementById('rateGrid').innerHTML=rateSteps.map(r=>`
    <div class="rate-item">
      <div class="rate-label">${r.label}</div>
      <div class="rate-pct">${r.open}</div>
    </div>`).join('');

  // Stage table
  const stages=[...new Set(rows.map(r=>r['전형단계']).filter(Boolean))].sort((a,b)=>{
    const ai=STAGE_ORDER.indexOf(a),bi=STAGE_ORDER.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  const jobGroups=[...new Set(rows.map(r=>r['직군']).filter(Boolean))].sort();

  let thead='<thead><tr><th class="left">구분</th>';
  stages.forEach(s=>thead+=`<th>${s}</th>`);
  thead+='<th>합계</th></tr></thead>';

  let tbody='<tbody>';
  // 직군별 행
  jobGroups.forEach(job=>{
    const jobRows=rows.filter(r=>r['직군']===job);
    let row=`<tr><td class="left"><span class="badge b-${job==='Tech'?'blue':job==='S&B'?'purple':job==='Corp'?'green':'amber'}">${job}</span></td>`;
    let total=0;
    stages.forEach(s=>{
      const cnt=jobRows.filter(r=>r['전형단계']===s).length;
      total+=cnt;
      row+=`<td class="${cnt===0?'zero':'num'}">${cnt===0?'-':cnt}</td>`;
    });
    row+=`<td class="num" style="font-weight:700">${total}</td></tr>`;
    tbody+=row;
  });
  // 합계 행
  let totalRow='<tr style="background:var(--surface2);font-weight:600"><td class="left">합계</td>';
  let grandTotal=0;
  stages.forEach(s=>{
    const cnt=rows.filter(r=>r['전형단계']===s).length;
    grandTotal+=cnt;
    totalRow+=`<td class="num">${cnt===0?'-':cnt}</td>`;
  });
  totalRow+=`<td class="num">${grandTotal}</td></tr>`;
  tbody+=totalRow+'</tbody>';
  document.getElementById('stageTable').innerHTML=thead+tbody;

  // Charts
  charts.forEach(c=>c.destroy()); charts=[];

  // Chart 1: Org by stage (bar)
  const lv5groups={};
  rows.forEach(r=>{
    const org=r['Lv.5']||r['Lv.4']||'기타';
    const s=r['전형단계'];
    if(!s)return;
    if(!lv5groups[org])lv5groups[org]={};
    lv5groups[org][s]=(lv5groups[org][s]||0)+1;
  });
  const topOrgs=Object.entries(lv5groups).sort((a,b)=>Object.values(b[1]).reduce((x,y)=>x+y,0)-Object.values(a[1]).reduce((x,y)=>x+y,0)).slice(0,15).map(e=>e[0]);
  const usedStages=[...new Set(rows.map(r=>r['전형단계']).filter(Boolean))];
  const ds1=usedStages.map(s=>({
    label:s,
    data:topOrgs.map(o=>(lv5groups[o]||{})[s]||0),
    backgroundColor:STAGE_COLORS[s]||'#94a3b8',
    stack:'stack'
  }));
  charts.push(new Chart(document.getElementById('cOrg'),{
    type:'bar',
    data:{labels:topOrgs,datasets:ds1},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,ticks:{font:{size:10},maxRotation:35}},y:{stacked:true,ticks:{font:{size:10}}}}}
  }));

  // Chart 2: Org funnel (grouped bar)
  const orgFunnel={};
  rows.forEach(r=>{
    const org=r['Lv.5']||r['Lv.4']||'기타';
    if(!orgFunnel[org])orgFunnel[org]={apply:0,i1:0,i2:0,hire:0};
    orgFunnel[org].apply+=n(r['지원자']);
    orgFunnel[org].i1+=n(r['1차 인터뷰']);
    orgFunnel[org].i2+=n(r['2차 인터뷰']);
    orgFunnel[org].hire+=n(r['최종합격']);
  });
  const topFunnelOrgs=Object.entries(orgFunnel).sort((a,b)=>b[1].apply-a[1].apply).slice(0,12).map(e=>e[0]);
  charts.push(new Chart(document.getElementById('cFunnel'),{
    type:'bar',
    data:{
      labels:topFunnelOrgs,
      datasets:[
        {label:'지원자',data:topFunnelOrgs.map(o=>orgFunnel[o].apply),backgroundColor:'#bfdbfe'},
        {label:'1차',data:topFunnelOrgs.map(o=>orgFunnel[o].i1),backgroundColor:'#818cf8'},
        {label:'2차',data:topFunnelOrgs.map(o=>orgFunnel[o].i2),backgroundColor:'#a78bfa'},
        {label:'합격',data:topFunnelOrgs.map(o=>orgFunnel[o].hire),backgroundColor:'#6ee7b7'},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:10}}},scales:{x:{ticks:{font:{size:10},maxRotation:35}},y:{ticks:{font:{size:10}}}}}
  }));
}

function setOwner(o){filters.owner=o==='전체'?null:o;render();}

function parseFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets['운영 시트'];
      if(!ws){alert('"운영 시트" 탭을 찾을 수 없습니다.');return;}
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      const hi=raw.findIndex(r=>r&&r.some&&r.some(c=>String(c||'').includes('No.')));
      if(hi<0){alert('헤더를 찾을 수 없습니다.');return;}
      const headers=raw[hi].map(c=>String(c||'').trim());
      const rows=raw.slice(hi+1).map(r=>{const o={};headers.forEach((h,i)=>{o[h]=r[i];});return o;});
      allRows=rows.filter(r=>{
        const nm=r['공고명'];
        return nm&&String(nm).trim()&&nm!=='NaN'&&nm!=='　'&&nm!=='0'&&Number(r['No.'])>0;
      });
      document.getElementById('uploadZone').classList.add('hidden');
      document.getElementById('lastUpdate').textContent=' · '+new Date().toLocaleDateString('ko-KR');
      filters={status:null,job:null,lv4:null,lv5:null,owner:null};
      render();
    }catch(err){alert('오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
